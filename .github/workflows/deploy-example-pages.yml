name: Deploy Example To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Published Consumer Example
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install library dependencies
        run: npm ci

      - name: Build library package
        run: npm run build

      - name: Install example dependencies
        run: npm ci
        working-directory: examples/react-published-package-consumer

      - name: Build example app
        run: npm run build
        working-directory: examples/react-published-package-consumer

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: examples/react-published-package-consumer/dist

  deploy:
    name: Deploy To GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
