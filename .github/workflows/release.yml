name: Release

on:
  push:
    tags:
      - v*.*.*

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: npm-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag against package version
        run: node ./scripts/validate-release-tag.mjs "${{ github.ref_name }}"

      - name: Run project checks
        run: npm run check

      - name: Run ship smoke checks
        run: npm run ship:check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run e2e

      - name: Check whether version already exists on npm
        id: npm-version
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Package ${package_name}@${package_version} already exists on npm"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.already_published != 'true'
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "Publishing with npm token fallback"
          else
            echo "Publishing with npm trusted publisher / OIDC"
          fi

          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish for existing version
        if: steps.npm-version.outputs.already_published == 'true'
        run: echo "Skipping npm publish because this version already exists on npm."

      - name: Create GitHub release
        run: |
          tag="${{ github.ref_name }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub release already exists for $tag"
          else
            gh release create "$tag" --verify-tag --generate-notes --latest
          fi
        env:
          GH_TOKEN: ${{ github.token }}
